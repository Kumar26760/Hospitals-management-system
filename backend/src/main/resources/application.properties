spring.application.name=hospital-management

# H2 File-Based Database (local dev)
spring.datasource.url=jdbc:h2:file:./data/hospital_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:hospitalManagementSystemSecretKeyForJWTTokenGenerationMustBeLongEnough}
jwt.expiration=86400000

# Fix: serialize LocalDateTime as ISO string, not array
spring.jackson.serialization.write-dates-as-timestamps=false
